<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zonic Kangujam</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0c;
      --accent: #b0b0a0;
      --accent-light: #d4d4c4;
      --text: #f0ebe0;
      --muted: #4a4a42;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    .glow {
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180,180,160,0.04) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
    }

    .top-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--accent));
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeIn 1s ease 0.2s forwards;
    }

    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 15vw, 7rem);
      letter-spacing: 0.18em;
      line-height: 1;
      text-align: center;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.4s forwards;
    }

    .name::after {
      content: 'KANGUJAM';
      display: block;
      font-size: clamp(1rem, 4vw, 1.5rem);
      letter-spacing: 0.55em;
      color: var(--accent);
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
      font-weight: 300;
    }

    .quote-wrap {
      margin-top: 44px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
    }

    .quote-main {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.75rem, 2.8vw, 0.95rem);
      letter-spacing: 0.45em;
      color: var(--accent-light);
      text-transform: uppercase;
      line-height: 1.8;
    }

    .quote-dot {
      display: inline-block;
      width: 3px;
      height: 3px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 14px;
      vertical-align: middle;
      opacity: 0.6;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin: 44px 0;
      opacity: 0;
      animation: fadeIn 1s ease 1s forwards;
    }

    .wa-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 44px;
      border: 1px solid rgba(176,176,160,0.4);
      border-radius: 2px;
      background: transparent;
      color: var(--accent-light);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 1.1s forwards;
      transition: color 0.3s;
    }

    .wa-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-light);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
    }

    .wa-btn:hover::before { transform: translateX(0); }
    .wa-btn:hover { color: #0c0c0c; }

    .wa-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    .wa-btn-text { position: relative; z-index: 1; }

    .bottom-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to top, transparent, var(--accent));
      margin-top: 48px;
      opacity: 0;
      animation: fadeIn 1s ease 1.4s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="page">
  <div class="top-line"></div>

  <h1 class="name">ZONIC</h1>

  <div class="quote-wrap">
    <p class="quote-main">
      No Noise<span class="quote-dot"></span>Just Progress
    </p>
  </div>

  <div class="divider"></div>

  <a class="wa-btn" href="https://wa.me/916909692441" target="_blank" rel="noopener">

  <div class="bottom-line"></div>
</div>

</body>
</html>
